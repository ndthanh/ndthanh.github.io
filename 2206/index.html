<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LQR Tuner — 2206</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;padding:8px;max-width:600px;margin:0 auto}
h1{font-size:16px;text-align:center;margin:6px 0;color:#4fc3f7}
.row{display:flex;gap:6px;margin:4px 0;align-items:center}
.btn{padding:6px 14px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.btn-blue{background:#1565c0;color:#fff}.btn-blue:hover{background:#1976d2}
.btn-green{background:#2e7d32;color:#fff}.btn-green:hover{background:#388e3c}
.btn-red{background:#c62828;color:#fff}.btn-red:hover{background:#d32f2f}
.btn-orange{background:#e65100;color:#fff}.btn-orange:hover{background:#ef6c00}
.btn:disabled{opacity:.4;cursor:default}
.card{background:#16213e;border-radius:8px;padding:10px;margin:6px 0}
.card h2{font-size:13px;color:#4fc3f7;margin-bottom:6px}
.status{text-align:center;font-size:11px;padding:4px;border-radius:4px;background:#0d1b2a}
.status.online{background:#1b5e20;color:#a5d6a7}
.slider-row{display:flex;align-items:center;gap:6px;margin:3px 0}
.slider-row label{min-width:28px;font-size:12px;font-weight:600;color:#90caf9}
.slider-row input[type=range]{flex:1;height:6px}
.slider-row .val{min-width:52px;text-align:right;font-size:12px;font-family:monospace}
.chart-box{height:70px;margin:2px 0}
.live-vals{display:flex;gap:8px;font-size:11px;font-family:monospace;justify-content:center;margin:4px 0}
.live-vals span{color:#4fc3f7}
.log{background:#0a0a1a;border-radius:6px;padding:6px;font-size:10px;font-family:monospace;max-height:120px;overflow-y:auto;margin:4px 0}
.log div{padding:1px 0}.log .ok{color:#66bb6a}.log .err{color:#ef5350}.log .info{color:#4fc3f7}
#otaDrop{border:2px dashed #333;border-radius:8px;padding:12px;text-align:center;font-size:12px;cursor:pointer;transition:border-color .2s}
#otaDrop.over{border-color:#4fc3f7}#otaDrop.has{border-color:#66bb6a;background:#0d2818}
.ota-progress{height:6px;background:#333;border-radius:3px;margin:4px 0;display:none}
.ota-progress .bar{height:100%;background:#4fc3f7;border-radius:3px;width:0;transition:width .3s}
</style>
</head>
<body>
<h1>LQR Tuner — 2206 Minimal</h1>

<!-- Connection -->
<div class="row" style="justify-content:center">
  <button id="connectBtn" class="btn btn-blue">Connect</button>
  <span id="statusText" class="status">OFFLINE</span>
</div>

<!-- ARM + Swing-up -->
<div class="row" style="justify-content:center">
  <button id="armBtn" class="btn btn-green" disabled>ARM</button>
  <button id="swingBtn" class="btn btn-orange" disabled>Swing Up</button>
  <button id="zeroBtn" class="btn btn-blue" disabled>Zero Cal</button>
</div>

<!-- LQR Gains -->
<div class="card">
  <h2>LQR Gains</h2>
  <div class="slider-row"><label>K1</label><input type="range" id="sK1" min="0" max="3" step="0.01" value="0.50"><span class="val" id="vK1">0.50</span></div>
  <div class="slider-row"><label>K2</label><input type="range" id="sK2" min="0" max="0.1" step="0.001" value="0.008"><span class="val" id="vK2">0.008</span></div>
  <div class="slider-row"><label>K3</label><input type="range" id="sK3" min="0" max="3" step="0.01" value="0.20"><span class="val" id="vK3">0.20</span></div>
  <div class="slider-row"><label>K4</label><input type="range" id="sK4" min="0" max="5" step="0.01" value="0.60"><span class="val" id="vK4">0.60</span></div>
  <div class="slider-row"><label>T</label><input type="range" id="sT" min="0" max="9" step="0.1" value="2.5"><span class="val" id="vT">2.5</span></div>
</div>

<!-- Live telemetry -->
<div class="card">
  <h2>Telemetry</h2>
  <div class="live-vals">
    <div>Pitch: <span id="livePitch">--</span></div>
    <div>Torque: <span id="liveTorque">--</span></div>
    <div>Vel: <span id="liveVel">--</span></div>
    <div>Pos: <span id="livePos">--</span></div>
  </div>
  <div class="chart-box"><canvas id="cPitch"></canvas></div>
  <div class="chart-box"><canvas id="cTorque"></canvas></div>
  <div class="chart-box"><canvas id="cVel"></canvas></div>
</div>

<!-- OTA -->
<div class="card">
  <h2>OTA Firmware Update</h2>
  <div class="row">
    <button id="otaLatest" class="btn btn-blue" disabled>Latest</button>
    <button id="otaStable" class="btn btn-green" disabled>Stable</button>
    <span id="otaFetchSt" style="font-size:11px;flex:1;text-align:right"></span>
  </div>
  <div id="otaDrop">Drop .bin file here or click to select</div>
  <input type="file" id="otaFile" accept=".bin" style="display:none">
  <div class="row" style="margin-top:4px">
    <label style="font-size:11px"><input type="checkbox" id="otaCompress" checked> zlib compress</label>
    <button id="otaFlash" class="btn btn-red" disabled style="margin-left:auto">Flash</button>
  </div>
  <div class="ota-progress" id="otaProg"><div class="bar" id="otaBar"></div></div>
</div>

<!-- BLE Log -->
<div class="card">
  <h2>Log</h2>
  <div class="log" id="logBox"></div>
</div>

<!-- Pitch offset (hidden detail) -->
<div class="card">
  <h2>Pitch Offset</h2>
  <div class="slider-row"><label>O</label><input type="range" id="sO" min="-15" max="15" step="0.1" value="0"><span class="val" id="vO">0.0</span></div>
</div>

<script>
// === BLE UUIDs ===
const SVC='4fafc201-1fb5-459e-8fcc-c5c9c331914b';
const CMD='beb5483e-36e1-4688-b7f5-ea07361b26a8';
const STS='beb5483e-36e1-4688-b7f5-ea07361b26a9';
const DAT='beb5483e-36e1-4688-b7f5-ea07361b26aa';
const LOG='beb5483e-36e1-4688-b7f5-ea07361b26ab';
const OTA_SVC='fb1e4001-54ae-4a28-9f74-dfccb248601d';
const OTA_CTL='fb1e4002-54ae-4a28-9f74-dfccb248601d';
const OTA_DAT='fb1e4003-54ae-4a28-9f74-dfccb248601d';

let device,charCmd,charSts,charDat,charLog,otaCtl,otaDat;
let connected=false, isArmed=false, robotState=0;
let otaData=null, otaUploading=false;
let mcuTimeMs=0;

const FW={
  latest:'https://raw.githubusercontent.com/ndthanh/ndthanh.github.io/master/2206/firmware.bin',
  stable:'https://raw.githubusercontent.com/ndthanh/ndthanh.github.io/master/2206/stable.bin'
};

// === DOM ===
const $=id=>document.getElementById(id);
const connectBtn=$('connectBtn'),statusText=$('statusText');
const armBtn=$('armBtn'),swingBtn=$('swingBtn'),zeroBtn=$('zeroBtn');
const logBox=$('logBox');

function setStatus(t,ok){statusText.textContent=t;statusText.className='status'+(ok?' online':'')}
function addLog(msg,cls=''){const d=document.createElement('div');d.className=cls;d.textContent=msg;logBox.appendChild(d);logBox.scrollTop=logBox.scrollHeight}

// === SLIDERS ===
const sliders=[
  {id:'sK1',vid:'vK1',cmd:'A',fmt:v=>v.toFixed(2)},
  {id:'sK2',vid:'vK2',cmd:'B',fmt:v=>v.toFixed(3)},
  {id:'sK3',vid:'vK3',cmd:'V',fmt:v=>v.toFixed(2)},
  {id:'sK4',vid:'vK4',cmd:'W',fmt:v=>v.toFixed(2)},
  {id:'sT',vid:'vT',cmd:'T',fmt:v=>v.toFixed(1)},
  {id:'sO',vid:'vO',cmd:'O',fmt:v=>v.toFixed(1)},
];
sliders.forEach(s=>{
  const el=$(s.id), vl=$(s.vid);
  el.addEventListener('input',()=>{vl.textContent=s.fmt(parseFloat(el.value))});
  el.addEventListener('change',()=>{sendCmd(s.cmd+el.value)});
});

async function sendCmd(str){
  if(!charCmd)return;
  try{await charCmd.writeValueWithResponse(new TextEncoder().encode(str))}catch(e){addLog('Send err: '+e.message,'err')}
}

// === CHARTS ===
const MAX_PTS=300;
function mkChart(id,color){
  return new Chart($(id).getContext('2d'),{type:'line',data:{labels:[],datasets:[{data:[],borderColor:color,borderWidth:1.2,pointRadius:0,tension:.2,fill:false}]},options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:true,grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(255,255,255,0.5)',font:{size:8},maxTicksLimit:3}}},interaction:{enabled:false}}});
}
const charts={pitch:mkChart('cPitch','#4dabf7'),torque:mkChart('cTorque','#ff6b6b'),vel:mkChart('cVel','#51cf66')};

function clearCharts(){mcuTimeMs=0;Object.values(charts).forEach(c=>{c.data.labels=[];c.data.datasets[0].data=[];c.update()})}

// === TELEMETRY ===
function onTelemetry(e){
  const dv=e.target.value;
  if(dv.byteLength<13)return;
  const pitch=dv.getInt16(0,true)/100;
  const rate=dv.getInt16(2,true)/10;
  const vel=dv.getInt16(4,true)/10;
  const pos=dv.getInt16(6,true)/100;
  const torque=dv.getInt16(8,true)/100;
  const dtUs=dv.getUint16(10,true);
  const flags=dv.getUint8(12);
  mcuTimeMs+=dtUs/1000;

  $('livePitch').textContent=pitch.toFixed(2)+'\u00B0';
  $('liveTorque').textContent=torque.toFixed(2)+'V';
  $('liveVel').textContent=vel.toFixed(1);
  $('livePos').textContent=pos.toFixed(1);

  const a=(flags&0x02)!==0;
  if(a!==isArmed){isArmed=a;armBtn.textContent=isArmed?'DISARM':'ARM';armBtn.className='btn '+(isArmed?'btn-red':'btn-green')}
  robotState=(flags>>2)&0x07;

  const vals={pitch,torque,vel};
  Object.entries(charts).forEach(([k,c])=>{c.data.labels.push(mcuTimeMs);c.data.datasets[0].data.push(vals[k]);if(c.data.labels.length>MAX_PTS){c.data.labels.shift();c.data.datasets[0].data.shift()}c.update()});
}

// === STATUS JSON ===
function onStatus(e){
  try{
    const j=JSON.parse(new TextDecoder().decode(e.target.value));
    if(j.A!=null)$('sK1').value=j.A,$('vK1').textContent=j.A.toFixed(2);
    if(j.B!=null)$('sK2').value=j.B,$('vK2').textContent=j.B.toFixed(3);
    if(j.V!=null)$('sK3').value=j.V,$('vK3').textContent=j.V.toFixed(2);
    if(j.W!=null)$('sK4').value=j.W,$('vK4').textContent=j.W.toFixed(2);
    if(j.T!=null)$('sT').value=j.T,$('vT').textContent=j.T.toFixed(1);
    if(j.O!=null)$('sO').value=j.O,$('vO').textContent=j.O.toFixed(1);
    if(j.armed!=null){isArmed=!!j.armed;armBtn.textContent=isArmed?'DISARM':'ARM';armBtn.className='btn '+(isArmed?'btn-red':'btn-green')}
    if(j.fw)addLog('FW: '+j.fw,'info');
  }catch(e){}
}

function onLog(e){addLog(new TextDecoder().decode(e.target.value),'ok')}

// === CONNECTION ===
connectBtn.addEventListener('click',async()=>{
  if(device&&device.gatt.connected){device.gatt.disconnect();return}
  try{
    setStatus('SCAN...',false);
    device=await navigator.bluetooth.requestDevice({filters:[{services:[SVC]}],optionalServices:[OTA_SVC]});
    device.addEventListener('gattserverdisconnected',onDisconnected);
    setStatus('LINK...',false);
    const srv=await device.gatt.connect();
    const svc=await srv.getPrimaryService(SVC);
    charCmd=await svc.getCharacteristic(CMD);
    charSts=await svc.getCharacteristic(STS);
    charDat=await svc.getCharacteristic(DAT);
    await charDat.startNotifications();charDat.addEventListener('characteristicvaluechanged',onTelemetry);
    await charSts.startNotifications();charSts.addEventListener('characteristicvaluechanged',onStatus);
    try{charLog=await svc.getCharacteristic(LOG);await charLog.startNotifications();charLog.addEventListener('characteristicvaluechanged',onLog)}catch(e){charLog=null}
    try{const os=await srv.getPrimaryService(OTA_SVC);otaCtl=await os.getCharacteristic(OTA_CTL);otaDat=await os.getCharacteristic(OTA_DAT);await otaCtl.startNotifications();otaCtl.addEventListener('characteristicvaluechanged',e=>{const b=new Uint8Array(e.target.value.buffer);if(b[0]===0x03)addLog('OTA ERROR from device','err')});addLog('OTA ready','ok')}catch(e){otaCtl=null;otaDat=null}

    // Read initial status
    const sv=await charSts.readValue();
    onStatus({target:{value:sv}});

    clearCharts();
    connected=true;
    setStatus('ONLINE',true);
    connectBtn.textContent='Disconnect';
    [armBtn,swingBtn,zeroBtn].forEach(b=>b.disabled=false);
    $('otaLatest').disabled=false;$('otaStable').disabled=false;
    if(otaData&&otaCtl)$('otaFlash').disabled=false;
  }catch(e){setStatus('OFFLINE',false);addLog('Conn fail: '+e.message,'err')}
});

function onDisconnected(){
  connected=false;isArmed=false;robotState=0;
  setStatus('OFFLINE',false);connectBtn.textContent='Connect';
  [armBtn,swingBtn,zeroBtn].forEach(b=>b.disabled=true);
  $('otaFlash').disabled=true;$('otaLatest').disabled=true;$('otaStable').disabled=true;
  device=null;charCmd=null;charSts=null;charDat=null;charLog=null;otaCtl=null;otaDat=null;
  armBtn.textContent='ARM';armBtn.className='btn btn-green';
  if(otaDiscoResolve){otaDiscoResolve(true);otaDiscoResolve=null}
}

// === ARM / SWING / ZERO ===
armBtn.addEventListener('click',()=>sendCmd('E'+(isArmed?'0':'1')));
swingBtn.addEventListener('click',()=>sendCmd('U1'));
zeroBtn.addEventListener('click',()=>sendCmd('z'));

// === OTA ===
const otaDrop=$('otaDrop'),otaFile=$('otaFile');
otaDrop.addEventListener('click',()=>otaFile.click());
otaDrop.addEventListener('dragover',e=>{e.preventDefault();otaDrop.classList.add('over')});
otaDrop.addEventListener('dragleave',()=>otaDrop.classList.remove('over'));
otaDrop.addEventListener('drop',e=>{e.preventDefault();otaDrop.classList.remove('over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});
otaFile.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0])});

function loadFile(f){
  const r=new FileReader();
  r.onload=()=>{
    otaData=new Uint8Array(r.result);
    otaDrop.textContent=f.name+' ('+(otaData.length/1024).toFixed(1)+' KB)';
    otaDrop.classList.add('has');
    if(connected&&otaCtl)$('otaFlash').disabled=false;
  };
  r.readAsArrayBuffer(f);
}

async function fetchFW(url,label,btn){
  btn.disabled=true;$('otaFetchSt').textContent='Downloading...';
  try{
    const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);
    const cl=r.headers.get('Content-Length');
    if(cl&&r.body){
      const total=parseInt(cl);const rd=r.body.getReader();const chunks=[];let got=0;
      while(true){const{done,value}=await rd.read();if(done)break;chunks.push(value);got+=value.length;$('otaFetchSt').textContent=`${(got/1024).toFixed(0)}/${(total/1024).toFixed(0)} KB`}
      otaData=new Uint8Array(got);let p=0;for(const c of chunks){otaData.set(c,p);p+=c.length}
    }else{otaData=new Uint8Array(await r.arrayBuffer())}
    otaDrop.textContent=label+' ('+(otaData.length/1024).toFixed(1)+' KB)';otaDrop.classList.add('has');
    $('otaFetchSt').textContent=(otaData.length/1024).toFixed(1)+' KB ready';$('otaFetchSt').style.color='#66bb6a';
    if(connected&&otaCtl)$('otaFlash').disabled=false;
    addLog('Downloaded: '+label,'ok');
  }catch(e){$('otaFetchSt').textContent='Error: '+e.message;$('otaFetchSt').style.color='#ef5350';addLog('DL fail: '+e.message,'err')}
  finally{btn.disabled=!connected}
}

$('otaLatest').addEventListener('click',()=>fetchFW(FW.latest,'firmware.bin (latest)',$('otaLatest')));
$('otaStable').addEventListener('click',()=>fetchFW(FW.stable,'stable.bin (stable)',$('otaStable')));

async function compressZlib(data){
  const cs=new CompressionStream('deflate');const w=cs.writable.getWriter();const rd=cs.readable.getReader();
  w.write(data);w.close();const chunks=[];
  while(true){const{done,value}=await rd.read();if(done)break;chunks.push(value)}
  const total=chunks.reduce((s,c)=>s+c.length,0);const out=new Uint8Array(total);let off=0;
  for(const c of chunks){out.set(c,off);off+=c.length}return out;
}

let otaDiscoResolve=null;
function waitDisconnect(ms=20000){return new Promise(r=>{otaDiscoResolve=r;setTimeout(()=>{if(otaDiscoResolve===r){otaDiscoResolve=null;r(false)}},ms)})}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

$('otaFlash').addEventListener('click',async()=>{
  if(!otaCtl||!otaDat||!otaData)return;
  otaUploading=true;$('otaFlash').disabled=true;
  const prog=$('otaProg'),bar=$('otaBar');
  prog.style.display='';bar.style.width='0%';

  try{
    let data=otaData;const useZ=typeof CompressionStream!=='undefined'&&$('otaCompress').checked;
    if(useZ){addLog('Compressing...','info');data=await compressZlib(otaData);addLog(`Compressed: ${(data.length/1024).toFixed(1)} KB (${(100-data.length/otaData.length*100).toFixed(0)}% smaller)`,'ok')}

    let cmd;
    if(useZ){
      cmd=new Uint8Array(9);cmd[0]=0x05;
      const u=otaData.length,c=data.length;
      cmd[1]=u&0xFF;cmd[2]=(u>>8)&0xFF;cmd[3]=(u>>16)&0xFF;cmd[4]=(u>>24)&0xFF;
      cmd[5]=c&0xFF;cmd[6]=(c>>8)&0xFF;cmd[7]=(c>>16)&0xFF;cmd[8]=(c>>24)&0xFF;
    }else{
      cmd=new Uint8Array(5);cmd[0]=0x01;const s=data.length;
      cmd[1]=s&0xFF;cmd[2]=(s>>8)&0xFF;cmd[3]=(s>>16)&0xFF;cmd[4]=(s>>24)&0xFF;
    }

    addLog(`OTA start: ${data.length} bytes${useZ?' (compressed)':''}`,'info');
    isArmed=false;armBtn.textContent='ARM';armBtn.className='btn btn-green';
    await otaCtl.writeValueWithResponse(cmd);await sleep(500);

    const CHUNK=512,total=Math.ceil(data.length/CHUNK);
    for(let i=0;i<total;i++){
      const chunk=data.slice(i*CHUNK,Math.min((i+1)*CHUNK,data.length));
      await otaDat.writeValueWithResponse(chunk);
      const pct=Math.round((i+1)/total*100);bar.style.width=pct+'%';
      if(pct%10===0&&pct<100)addLog(pct+'%','info');
    }

    addLog('Finalizing...','info');await sleep(500);
    const dp=waitDisconnect(20000);
    await otaCtl.writeValueWithResponse(new Uint8Array([0x02]));
    const ok=await dp;
    addLog(ok?'OTA complete! Rebooted.':'OTA: no reboot detected',ok?'ok':'err');
    bar.style.width='100%';
  }catch(e){
    addLog('OTA fail: '+e.message,'err');bar.style.width='0%';
    try{await otaCtl.writeValueWithResponse(new Uint8Array([0x03]))}catch(_){}
  }
  otaUploading=false;if(connected&&otaCtl&&otaData)$('otaFlash').disabled=false;
});
</script>
</body>
</html>
